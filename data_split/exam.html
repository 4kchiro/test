<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT N3 모의고사</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
/* ── 디자인 토큰 ── */
:root {
  --bg:       #f7f6f3;
  --surface:  #ffffff;
  --border:   #e8e6e0;
  --text:     #1a1917;
  --muted:    #8a8780;
  --accent:   #3d6b4f;
  --accent-l: #eaf2ed;
  --accent-d: #2e5239;
  --warn:     #c0392b;
  --warn-l:   #fdecea;
  --gold:     #c9963a;
  --gold-l:   #fdf6e8;
  --radius:   12px;
  --shadow:   0 2px 16px rgba(0,0,0,.07);
  --mono:     'DM Mono', monospace;
  --jp:       'Noto Serif JP', serif;
  --sans:     'Noto Sans KR', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

/* ── 화면 전환 ── */
.screen{display:none}
.screen.active{display:flex;flex-direction:column;min-height:100vh}

/* ══════════════════════════════════════════
   1. 회차 선택 화면
══════════════════════════════════════════ */
#s-select{align-items:center;justify-content:center;padding:40px 20px}
.select-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px;box-shadow:var(--shadow);width:100%;max-width:520px}
.app-logo{font-family:var(--jp);font-size:1.6rem;font-weight:700;letter-spacing:3px;color:var(--text);margin-bottom:4px}
.app-sub{font-size:.78rem;color:var(--muted);letter-spacing:.5px;margin-bottom:32px}
.section-label{font-size:.7rem;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:12px}
.exam-list{display:flex;flex-direction:column;gap:8px}
.exam-item{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);cursor:pointer;transition:border-color .15s,background .15s;text-align:left}
.exam-item:hover{border-color:var(--accent);background:var(--accent-l)}
.exam-badge{font-family:var(--mono);font-size:.7rem;font-weight:500;padding:2px 7px;border-radius:4px;flex-shrink:0}
.badge-new{background:var(--accent-l);color:var(--accent)}
.badge-old{background:var(--gold-l);color:var(--gold)}
.exam-label{font-size:.95rem;font-weight:600;flex:1}
.exam-meta{font-size:.75rem;color:var(--muted)}
.exam-arrow{color:var(--border);font-size:.9rem}
.exam-item:hover .exam-arrow{color:var(--accent)}

/* ══════════════════════════════════════════
   2. 시험 화면 공통
══════════════════════════════════════════ */
#s-exam{flex-direction:column}

/* 헤더 */
.exam-header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:16px;height:56px;flex-shrink:0;position:sticky;top:0;z-index:100}
.hdr-section{font-size:.75rem;font-weight:700;color:var(--accent);letter-spacing:.5px}
.hdr-round{font-size:.8rem;color:var(--muted)}
.hdr-spacer{flex:1}
.hdr-timer{font-family:var(--mono);font-size:1.1rem;font-weight:500;color:var(--text);background:var(--bg);padding:5px 14px;border-radius:8px;border:1px solid var(--border);min-width:80px;text-align:center;transition:color .3s,background .3s}
.hdr-timer.warn{color:var(--warn);background:var(--warn-l);border-color:#f5c6c2}
.hdr-timer.crit{color:#fff;background:var(--warn);border-color:var(--warn);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}

/* 진행 바 */
.progress-bar{height:3px;background:var(--border);flex-shrink:0}
.progress-fill{height:100%;background:var(--accent);transition:width .3s;border-radius:0 2px 2px 0}

/* 본문 */
.exam-body{flex:1;overflow-y:auto;padding:28px 24px 120px;max-width:720px;margin:0 auto;width:100%}

/* 문제 구분 헤더 */
.mondai-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.mondai-badge{font-size:.7rem;font-weight:700;background:var(--accent);color:#fff;padding:3px 9px;border-radius:4px;letter-spacing:.5px}
.mondai-type{font-size:.78rem;color:var(--muted);font-weight:500}
.mondai-inst{font-size:.82rem;color:var(--text);line-height:1.5;margin-bottom:20px;padding:12px 14px;background:var(--accent-l);border-radius:8px;border-left:3px solid var(--accent)}

/* 문항 번호 */
.q-num{font-family:var(--mono);font-size:.75rem;color:var(--muted);margin-bottom:8px}

/* 문장 표시 */
.q-sentence{font-family:var(--jp);font-size:1.1rem;line-height:1.9;margin-bottom:20px;background:var(--surface);padding:18px 20px;border-radius:10px;border:1px solid var(--border)}
.q-sentence.kanji-q .tgt{text-decoration:underline;text-decoration-color:var(--accent);text-underline-offset:4px;font-weight:700}
.q-theme{font-family:var(--jp);font-size:1.2rem;font-weight:700;text-align:center;padding:18px;background:var(--surface);border-radius:10px;border:1px solid var(--border);margin-bottom:16px}

/* 지문 (文章文法用) */
.passage-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px 22px;margin-bottom:20px;font-family:var(--jp);font-size:.95rem;line-height:2}
.passage-box .psg-title{font-size:.8rem;font-weight:700;color:var(--muted);margin-bottom:10px;letter-spacing:.5px}
.passage-box .blank-mark{display:inline-block;background:var(--accent-l);border:1.5px solid var(--accent);border-radius:4px;padding:0 6px;font-family:var(--mono);font-size:.8rem;font-weight:700;color:var(--accent);vertical-align:middle;margin:0 2px}
.passage-box .blank-mark.current{background:var(--accent);color:#fff}

/* ★ 문제 */
.star-sentence{font-family:var(--jp);font-size:1rem;line-height:2;background:var(--surface);padding:16px 18px;border-radius:10px;border:1px solid var(--border);margin-bottom:8px}
.star-inst{font-size:.78rem;color:var(--muted);margin-bottom:16px;text-align:right}

/* 선택지 */
.choices{display:flex;flex-direction:column;gap:10px}
.choice-btn{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);cursor:pointer;font-family:var(--jp);font-size:.95rem;line-height:1.6;transition:border-color .12s,background .12s;text-align:left;width:100%}
.choice-btn:hover:not(:disabled){border-color:var(--accent);background:var(--accent-l)}
.choice-btn.selected{border-color:var(--accent);background:var(--accent-l)}
.choice-btn.correct{border-color:#27ae60;background:#eafaf1;color:#1a6d3c}
.choice-btn.wrong{border-color:var(--warn);background:var(--warn-l);color:var(--warn)}
.choice-btn:disabled{cursor:default}
.choice-num{font-family:var(--mono);font-size:.78rem;font-weight:700;color:var(--muted);flex-shrink:0;min-width:18px;padding-top:1px}
.choice-btn.selected .choice-num,.choice-btn.correct .choice-num,.choice-btn.wrong .choice-num{color:inherit}

/* 루비(후리가나) */
ruby rt{font-size:.55em;color:var(--muted)}

/* ── 하단 내비 ── */
.exam-footer{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;z-index:100}
.nav-dots{flex:1;display:flex;flex-wrap:wrap;gap:5px;justify-content:center;max-width:600px;margin:0 auto}
.nav-dot{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;font-size:.65rem;font-weight:700;font-family:var(--mono);color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
.nav-dot.answered{background:var(--accent-l);border-color:var(--accent);color:var(--accent)}
.nav-dot.current{background:var(--accent);border-color:var(--accent);color:#fff;transform:scale(1.1)}
.nav-dot.correct-dot{background:#eafaf1;border-color:#27ae60;color:#1a6d3c}
.nav-dot.wrong-dot{background:var(--warn-l);border-color:var(--warn);color:var(--warn)}
.nav-btn{padding:10px 20px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:.85rem;font-family:var(--sans);cursor:pointer;font-weight:600;transition:all .12s;flex-shrink:0}
.nav-btn:hover{border-color:var(--accent);background:var(--accent-l)}
.nav-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.nav-btn.primary:hover{background:var(--accent-d)}
.nav-btn:disabled{opacity:.4;cursor:default}

/* ══════════════════════════════════════════
   3. 쉬는시간 화면
══════════════════════════════════════════ */
#s-break{align-items:center;justify-content:center;padding:40px 20px}
.break-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:48px 40px;box-shadow:var(--shadow);max-width:420px;width:100%;text-align:center}
.break-icon{font-size:2.5rem;margin-bottom:16px}
.break-title{font-size:1.3rem;font-weight:700;margin-bottom:8px}
.break-sub{color:var(--muted);font-size:.9rem;margin-bottom:8px}
.break-stat{font-family:var(--mono);font-size:.85rem;color:var(--accent);background:var(--accent-l);padding:8px 16px;border-radius:8px;margin:16px 0 28px;display:inline-block}
.break-note{font-size:.8rem;color:var(--muted);margin-bottom:24px;line-height:1.6;background:var(--bg);padding:12px 16px;border-radius:8px;text-align:left}
.btn-start{width:100%;padding:16px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;font-family:var(--sans);cursor:pointer;transition:background .15s}
.btn-start:hover{background:var(--accent-d)}

/* ══════════════════════════════════════════
   4. 결과 화면
══════════════════════════════════════════ */
#s-result{align-items:center;padding:40px 20px;background:var(--bg)}
.result-wrap{max-width:560px;width:100%}
.result-header{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:36px;box-shadow:var(--shadow);margin-bottom:20px;text-align:center}
.result-round{font-size:.8rem;color:var(--muted);margin-bottom:8px}
.result-score-main{font-family:var(--mono);font-size:3.5rem;font-weight:700;line-height:1;margin-bottom:6px}
.result-score-main.pass{color:var(--accent)}
.result-score-main.target{color:var(--gold)}
.result-score-main.fail{color:var(--warn)}
.result-score-sub{font-size:.9rem;color:var(--muted);margin-bottom:20px}
.result-verdict{display:inline-block;padding:6px 18px;border-radius:20px;font-size:.85rem;font-weight:700;margin-bottom:20px}
.verdict-pass{background:var(--accent-l);color:var(--accent)}
.verdict-target{background:var(--gold-l);color:var(--gold)}
.verdict-fail{background:var(--warn-l);color:var(--warn)}

/* 기준선 바 */
.score-bar-wrap{position:relative;height:8px;background:var(--border);border-radius:4px;margin:16px 0 8px}
.score-bar-fill{height:100%;border-radius:4px;transition:width .8s ease;background:var(--accent)}
.score-bar-fill.target-c{background:var(--gold)}
.score-bar-fill.fail-c{background:var(--warn)}
.score-markers{display:flex;justify-content:space-between;font-size:.68rem;color:var(--muted);margin-top:4px}
.score-marker-line{position:absolute;top:-4px;bottom:-4px;width:2px;border-radius:1px}
.marker-pass{background:var(--accent)}
.marker-target{background:var(--gold)}

/* 섹션별 점수 */
.result-sections{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.result-sec-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;text-align:center}
.sec-label{font-size:.72rem;font-weight:700;color:var(--muted);margin-bottom:4px;letter-spacing:.5px}
.sec-score{font-family:var(--mono);font-size:1.5rem;font-weight:700;color:var(--text)}
.sec-detail{font-size:.72rem;color:var(--muted);margin-top:2px}

/* 문항별 결과 */
.result-review{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:20px}
.review-title{font-size:.8rem;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:14px}
.review-dots{display:flex;flex-wrap:wrap;gap:6px}
.rdot{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;font-family:var(--mono)}
.rdot.ok{background:#eafaf1;color:#1a6d3c;border:1px solid #a9dfbf}
.rdot.ng{background:var(--warn-l);color:var(--warn);border:1px solid #f5c6c2}
.rdot.na{background:var(--bg);color:var(--muted);border:1px solid var(--border)}

/* 재도전 버튼 */
.result-actions{display:flex;gap:10px}
.btn-retry,.btn-home{flex:1;padding:14px;border-radius:10px;font-size:.9rem;font-weight:700;font-family:var(--sans);cursor:pointer;transition:all .15s;border:1.5px solid}
.btn-retry{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-retry:hover{background:var(--accent-d)}
.btn-home{background:var(--bg);color:var(--text);border-color:var(--border)}
.btn-home:hover{border-color:var(--accent);background:var(--accent-l)}
</style>
</head>
<body>

<!-- ══ 회차 선택 ══ -->
<div id="s-select" class="screen active">
  <div class="select-card">
    <div class="app-logo">日本語</div>
    <div class="app-sub">JLPT N3 · 언어지식 모의고사</div>
    <div class="section-label">회차 선택</div>
    <div class="exam-list" id="exam-list"></div>
  </div>
</div>

<!-- ══ 시험 ══ -->
<div id="s-exam" class="screen">
  <header class="exam-header">
    <span class="hdr-section" id="hdr-section">문자어휘</span>
    <span class="hdr-round" id="hdr-round"></span>
    <span class="hdr-spacer"></span>
    <div class="hdr-timer" id="hdr-timer">30:00</div>
  </header>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="exam-body" id="exam-body"></div>
  <footer class="exam-footer">
    <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">‹ 이전</button>
    <div class="nav-dots" id="nav-dots"></div>
    <button class="nav-btn primary" id="btn-next" onclick="navigate(1)">다음 ›</button>
  </footer>
</div>

<!-- ══ 쉬는시간 ══ -->
<div id="s-break" class="screen">
  <div class="break-card">
    <div class="break-icon">☕</div>
    <div class="break-title">문자어휘 완료!</div>
    <div class="break-sub" id="break-sub">쉬는시간입니다. 준비되면 문법을 시작하세요.</div>
    <div class="break-stat" id="break-stat"></div>
    <div class="break-note">
      ⚠️ 채점은 <strong>문법까지 완료한 후</strong>에 공개됩니다.<br>
      지금은 결과를 확인할 수 없어요.
    </div>
    <button class="btn-start" onclick="startGrammar()">문법 시험 시작하기 →</button>
  </div>
</div>

<!-- ══ 결과 ══ -->
<div id="s-result" class="screen">
  <div class="result-wrap">
    <div class="result-header">
      <div class="result-round" id="res-round"></div>
      <div class="result-score-main" id="res-score"></div>
      <div class="result-score-sub">/ 60점 만점</div>
      <div class="result-verdict" id="res-verdict"></div>
      <div class="score-bar-wrap" id="score-bar-wrap">
        <div class="score-bar-fill" id="score-bar"></div>
        <!-- 합격 마커 -->
        <div class="score-marker-line marker-pass" style="left:33.3%"></div>
        <div class="score-marker-line marker-target" style="left:41.7%"></div>
      </div>
      <div class="score-markers">
        <span>0점</span><span style="position:relative;left:-8px">합격<br>20</span>
        <span style="position:relative;left:-8px">목표<br>25</span><span>60점</span>
      </div>
    </div>

    <div class="result-sections">
      <div class="result-sec-card">
        <div class="sec-label">문자어휘</div>
        <div class="sec-score" id="res-vocab-score"></div>
        <div class="sec-detail" id="res-vocab-detail"></div>
      </div>
      <div class="result-sec-card">
        <div class="sec-label">문법</div>
        <div class="sec-score" id="res-gram-score"></div>
        <div class="sec-detail" id="res-gram-detail"></div>
      </div>
    </div>

    <div class="result-review">
      <div class="review-title">문자어휘 정오답</div>
      <div class="review-dots" id="review-vocab"></div>
    </div>
    <div class="result-review">
      <div class="review-title">문법 정오답</div>
      <div class="review-dots" id="review-gram"></div>
    </div>

    <div class="result-actions">
      <button class="btn-home" onclick="goHome()">← 회차 선택</button>
      <button class="btn-retry" onclick="retryExam()">다시 풀기</button>
    </div>
  </div>
</div>

<script src="data_index.js"></script>
<script>
/* ══════════════════════════════════════════
   상태
══════════════════════════════════════════ */
let state = {
  examId: null,
  exam: null,
  phase: 'vocab',        // 'vocab' | 'grammar'
  qIndex: 0,
  vocabAnswers: [],      // 각 문항 선택 번호 (1~4, 0=미답)
  gramAnswers: [],
  vocabTimeLeft: 30 * 60,
  gramTimeLeft:  20 * 60,
  timerInterval: null,
  vocabStarted: false,
  gramStarted: false,
};

/* ══════════════════════════════════════════
   유틸
══════════════════════════════════════════ */
// 《》 후리가나 → <ruby> 변환
function parseRuby(text) {
  return text.replace(/([^《》]+)《([^》]+)》/g,
    '<ruby>$1<rt>$2</rt></ruby>');
}

// 밑줄 타겟 강조 (問1,2,4)
function highlightTarget(sentence, target) {
  if (!target) return parseRuby(sentence);
  const esc = target.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return parseRuby(sentence).replace(
    new RegExp(esc, 'g'),
    `<span class="tgt">${target}</span>`
  );
}

// (지문: ...) 접두어 파싱
function parsePassageMarker(sentence) {
  const m = sentence.match(/^（지문[^）]*）(.+)/s) ||
            sentence.match(/^\(지문[^)]*\)(.+)/s);
  return m ? m[1].trim() : sentence;
}

function fmtTime(sec) {
  const m = Math.floor(sec / 60), s = sec % 60;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

/* ══════════════════════════════════════════
   회차 목록 렌더
══════════════════════════════════════════ */
/* ── 동적 로딩 캐시 ── */
window.__examCache = window.__examCache || {};

function loadExamFile(id) {
  return new Promise((resolve, reject) => {
    if (window.__examCache[id]) { resolve(window.__examCache[id]); return; }
    const s = document.createElement('script');
    s.src = 'data_' + id + '.js';
    s.onload = () => {
      if (window.__examCache[id]) resolve(window.__examCache[id]);
      else reject(new Error('로드 후 데이터 없음: ' + id));
    };
    s.onerror = () => reject(new Error('파일 로드 실패: data_' + id + '.js'));
    document.head.appendChild(s);
  });
}

function renderExamList() {
  const el = document.getElementById('exam-list');
  el.innerHTML = '';
  const src = (typeof JLPT_N3_INDEX !== 'undefined') ? JLPT_N3_INDEX
             : (typeof JLPT_N3_DATA  !== 'undefined')
               ? { order: JLPT_N3_DATA.order,
                   meta: Object.fromEntries(
                     Object.entries(JLPT_N3_DATA.exams).map(([k,v]) =>
                       [k, {...v, vocabCount: v.vocab.length, gramCount: v.grammar.length}])) }
               : null;
  if (!src) { el.innerHTML = '<p style="color:red">data_index.js 또는 data.js가 없습니다</p>'; return; }

  src.order.forEach(id => {
    const e = src.meta[id];
    const li = document.createElement('button');
    li.className = 'exam-item';
    li.onclick = () => startExam(id);
    li.innerHTML = `
      <span class="exam-badge ${e.format === '新' ? 'badge-new' : 'badge-old'}">${e.format}포맷</span>
      <span class="exam-label">${e.label}</span>
      <span class="exam-meta">${e.vocabCount}문자어휘 · ${e.gramCount}문법</span>
      <span class="exam-arrow">›</span>`;
    el.appendChild(li);
  });
}

/* ══════════════════════════════════════════
   시험 시작 (동적 로딩)
══════════════════════════════════════════ */
function startExam(id) {
  /* 구버전 data.js (JLPT_N3_DATA) 호환 */
  if (typeof JLPT_N3_DATA !== 'undefined' && JLPT_N3_DATA.exams && JLPT_N3_DATA.exams[id]) {
    window.__examCache[id] = JLPT_N3_DATA.exams[id];
  }
  if (window.__examCache[id]) {
    _doStartExam(id, window.__examCache[id]);
    return;
  }
  /* 로딩 표시 */
  const btn = document.querySelector('.exam-item:focus') || document.activeElement;
  if (btn) btn.disabled = true;
  const msg = document.getElementById('exam-list');
  const old = msg.innerHTML;
  msg.innerHTML = '<p style="text-align:center;padding:2rem;color:#3D6B4F;font-size:1.1rem">⏳ ' + id + ' 로딩 중...</p>';

  loadExamFile(id)
    .then(exam => { msg.innerHTML = old; _doStartExam(id, exam); })
    .catch(err  => { msg.innerHTML = old; alert('로드 실패: ' + err.message); if (btn) btn.disabled = false; });
}

function _doStartExam(id, exam) {
  state.examId = id;
  state.exam = exam;
  state.phase = 'vocab';
  state.qIndex = 0;
  state.vocabAnswers = new Array(exam.vocab.length).fill(0);
  state.gramAnswers  = new Array(exam.grammar.length).fill(0);
  state.vocabTimeLeft = 30 * 60;
  state.gramTimeLeft  = 20 * 60;
  state.vocabStarted = true;
  state.gramStarted  = false;

  document.getElementById('hdr-section').textContent = '문자어휘 (30분)';
  document.getElementById('hdr-round').textContent = exam.label;
  showScreen('s-exam');
  renderQuestion();
  startTimer();
}

/* ══════════════════════════════════════════
   타이머
══════════════════════════════════════════ */
function startTimer() {
  clearInterval(state.timerInterval);
  const el = document.getElementById('hdr-timer');
  state.timerInterval = setInterval(() => {
    if (state.phase === 'vocab') {
      state.vocabTimeLeft = Math.max(0, state.vocabTimeLeft - 1);
      el.textContent = fmtTime(state.vocabTimeLeft);
      el.className = 'hdr-timer' +
        (state.vocabTimeLeft <= 60 ? ' crit' :
         state.vocabTimeLeft <= 300 ? ' warn' : '');
      if (state.vocabTimeLeft === 0) endVocab();
    } else {
      state.gramTimeLeft = Math.max(0, state.gramTimeLeft - 1);
      el.textContent = fmtTime(state.gramTimeLeft);
      el.className = 'hdr-timer' +
        (state.gramTimeLeft <= 60 ? ' crit' :
         state.gramTimeLeft <= 300 ? ' warn' : '');
      if (state.gramTimeLeft === 0) showResult();
    }
  }, 1000);
}

/* ══════════════════════════════════════════
   문제 렌더
══════════════════════════════════════════ */
function currentQuestions() {
  return state.phase === 'vocab' ? state.exam.vocab : state.exam.grammar;
}
function currentAnswers() {
  return state.phase === 'vocab' ? state.vocabAnswers : state.gramAnswers;
}

// 問題 지시문
const INSTRUCTIONS = {
  '漢字読み':  '___の言葉の読み方として最もよいものを、1・2・3・4から一つえらびなさい。',
  '表記':      '___のことばを漢字で書くとき、最もよいものを、1・2・3・4から一つえらびなさい。',
  '文脈規定':  '（　）に入れるのに最もよいものを、1・2・3・4から一つえらびなさい。',
  '言換類義':  '___に意味が最も近いものを、1・2・3・4から一つえらびなさい。',
  '用法':      'つぎのことばの使い方として最もよいものを、1・2・3・4から一つえらびなさい。',
  '文法形式':  'つぎの文の（　）に入れるのに最もよいものを、1・2・3・4から一つえらびなさい。',
  '文並替★':  'つぎの文の　★　に入る最もよいものを、1・2・3・4から一つえらびなさい。',
  '文章文法':  'つぎの文章を読んで、（　）の中に入る最もよいものを、1・2・3・4から一つえらびなさい。',
};

// 지문 그룹핑 (文章文法)
function getPassageGroup(qs, idx) {
  const q = qs[idx];
  if (q.type !== '文章文法') return null;
  // 같은 mondai의 모든 問3 문항
  return qs.filter(x => x.mondai === q.mondai && x.type === '文章文法');
}

function buildPassageHtml(group, currentNum) {
  const firstQ = group[0];
  const firstSent = parsePassageMarker(firstQ.sentence);

  // Q19에 전체 지문이 있는 경우 (빈칸 번호가 2개 이상 OR 200자 이상)
  const blankCount = (firstSent.match(/\(\d+\)/g) || []).length;
  const isFullPassage = blankCount >= 2 || firstSent.length > 200;

  if (isFullPassage) {
    // 전체 지문을 한 번에 표시, 현재 문항 빈칸 강조
    const html = parseRuby(firstSent).replace(
      /\((\d+)\)/g,
      (_, n) => {
        const num = parseInt(n);
        const cls = num === currentNum ? 'blank-mark current' : 'blank-mark';
        return `<span class="${cls}">(${n})</span>`;
      }
    );
    return html;
  }

  // fallback: 각 문항 문장을 이어붙임 (구 방식)
  const parts = group.map(q => {
    const s = parsePassageMarker(q.sentence);
    const cls = q.num === currentNum ? 'blank-mark current' : 'blank-mark';
    return parseRuby(s).replace(
      /\((\d+)\)/g,
      `<span class="${cls}">($1)</span>`
    );
  });
  return parts.join('<br>');
}

function renderQuestion() {
  const qs = currentQuestions();
  const idx = state.qIndex;
  const q = qs[idx];
  const ans = currentAnswers();
  const body = document.getElementById('exam-body');
  const total = qs.length;

  // 진행률
  const answered = ans.filter(a => a > 0).length;
  document.getElementById('prog-fill').style.width = `${(answered / total * 100).toFixed(1)}%`;

  // 네비 점
  renderDots(qs, ans, idx);

  // 이전/다음 버튼
  document.getElementById('btn-prev').disabled = idx === 0;

  const isLast = idx === total - 1;
  const nextBtn = document.getElementById('btn-next');
  if (isLast) {
    nextBtn.textContent = state.phase === 'vocab' ? '문자어휘 완료 →' : '채점하기 →';
    nextBtn.className = 'nav-btn primary';
  } else {
    nextBtn.textContent = '다음 ›';
    nextBtn.className = 'nav-btn primary';
  }

  // ── 본문 ──
  let html = '';

  // 問 구분
  const prevMondai = idx > 0 ? qs[idx - 1].mondai : -1;
  if (q.mondai !== prevMondai) {
    const inst = INSTRUCTIONS[q.type] || '';
    html += `
      <div class="mondai-header">
        <span class="mondai-badge">問題 ${q.mondai}</span>
        <span class="mondai-type">${q.type}</span>
      </div>
      ${inst ? `<div class="mondai-inst">${inst}</div>` : ''}`;
  }

  html += `<div class="q-num">${idx + 1} / ${total} &nbsp;—&nbsp; 문항 ${q.num}번</div>`;

  // ── 문형별 렌더 ──
  if (q.type === '用法') {
    // 테마 단어 + 4개 문장 선택지
    html += `<div class="q-theme">${parseRuby(q.sentence)}</div>`;
    html += buildChoices(q, ans[idx], idx);

  } else if (q.type === '文並替★') {
    // ★ 문제
    const stSentence = q.sentence.replace(/___★___/, '<strong>＿★＿</strong>');
    html += `<div class="star-sentence">${parseRuby(stSentence)}</div>
             <div class="star-inst">★ の位置に入るものを選んでください</div>`;
    html += buildChoices(q, ans[idx], idx);

  } else if (q.type === '文章文法') {
    // 지문 + 선택지
    const group = getPassageGroup(qs, idx);
    if (group) {
      const passHtml = buildPassageHtml(group, q.num);
      html += `<div class="passage-box">
        <div class="psg-title">文章</div>
        <div>${passHtml}</div>
      </div>`;
    }
    html += buildChoices(q, ans[idx], idx);

  } else if (q.type === '漢字読み' || q.type === '言換類義') {
    // 밑줄 단어 강조
    html += `<div class="q-sentence kanji-q">${highlightTarget(q.sentence, q.target)}</div>`;
    html += buildChoices(q, ans[idx], idx);

  } else {
    // 표기, 문맥규정, 문법형식
    html += `<div class="q-sentence">${parseRuby(q.sentence)}</div>`;
    html += buildChoices(q, ans[idx], idx);
  }

  body.innerHTML = html;
}

function buildChoices(q, userAns, idx) {
  let html = '<div class="choices">';
  q.choices.forEach((ch, ci) => {
    const n = ci + 1;
    let cls = 'choice-btn';
    if (userAns === n) cls += ' selected';
    html += `<button class="${cls}" onclick="selectAnswer(${idx}, ${n})" ${userAns > 0 ? '' : ''}>
               <span class="choice-num">${n}</span>
               <span>${parseRuby(ch)}</span>
             </button>`;
  });
  return html + '</div>';
}

function renderDots(qs, ans, cur) {
  const wrap = document.getElementById('nav-dots');
  wrap.innerHTML = '';
  qs.forEach((q, i) => {
    const d = document.createElement('button');
    d.className = 'nav-dot' +
      (i === cur ? ' current' : ans[i] > 0 ? ' answered' : '');
    d.textContent = q.num;
    d.onclick = () => { state.qIndex = i; renderQuestion(); };
    wrap.appendChild(d);
  });
}

/* ══════════════════════════════════════════
   답안 선택
══════════════════════════════════════════ */
function selectAnswer(idx, num) {
  const ans = currentAnswers();
  ans[idx] = num;
  renderQuestion();
}

/* ══════════════════════════════════════════
   내비게이션
══════════════════════════════════════════ */
function navigate(dir) {
  const qs = currentQuestions();
  const newIdx = state.qIndex + dir;
  if (newIdx < 0) return;
  if (newIdx >= qs.length) {
    // 마지막 → 섹션 완료
    if (state.phase === 'vocab') endVocab();
    else showResult();
    return;
  }
  state.qIndex = newIdx;
  renderQuestion();
  document.getElementById('exam-body').scrollTop = 0;
}

/* ══════════════════════════════════════════
   문자어휘 완료
══════════════════════════════════════════ */
function endVocab() {
  clearInterval(state.timerInterval);
  const answered = state.vocabAnswers.filter(a => a > 0).length;
  const total = state.exam.vocab.length;
  const elapsed = 30 * 60 - state.vocabTimeLeft;
  const mm = Math.floor(elapsed / 60), ss = elapsed % 60;

  document.getElementById('break-stat').textContent =
    `${answered}/${total}문항 답변 · 소요 시간 ${mm}분 ${ss}초`;

  showScreen('s-break');
}

/* ══════════════════════════════════════════
   문법 시작
══════════════════════════════════════════ */
function startGrammar() {
  state.phase = 'grammar';
  state.qIndex = 0;
  state.gramStarted = true;
  state.gramTimeLeft = 20 * 60;

  document.getElementById('hdr-section').textContent = '문법 (20분)';
  document.getElementById('hdr-timer').textContent = '20:00';
  showScreen('s-exam');
  renderQuestion();
  startTimer();
}

/* ══════════════════════════════════════════
   채점 및 결과 표시
══════════════════════════════════════════ */
function showResult() {
  clearInterval(state.timerInterval);

  const vq = state.exam.vocab,   va = state.vocabAnswers;
  const gq = state.exam.grammar, ga = state.gramAnswers;
  const totalQ = vq.length + gq.length;

  const vCorrect = va.filter((a, i) => a === vq[i].answer).length;
  const gCorrect = ga.filter((a, i) => a === gq[i].answer).length;
  const totalCorrect = vCorrect + gCorrect;

  // 60점 만점 환산
  const score60 = Math.round((totalCorrect / totalQ) * 60 * 10) / 10;
  const vScore  = Math.round((vCorrect / vq.length) * 100);
  const gScore  = Math.round((gCorrect / gq.length) * 100);

  // 판정
  const pass   = score60 >= 20;
  const target = score60 >= 25;
  let verdictClass, verdictText;
  if (target)     { verdictClass = 'verdict-target'; verdictText = '🎯 목표 달성!'; }
  else if (pass)  { verdictClass = 'verdict-pass';   verdictText = '✅ 합격'; }
  else            { verdictClass = 'verdict-fail';   verdictText = '❌ 불합격'; }

  document.getElementById('res-round').textContent = state.exam.label;
  const scoreEl = document.getElementById('res-score');
  scoreEl.textContent = score60.toFixed(1);
  scoreEl.className = 'result-score-main ' + (target ? 'target' : pass ? 'pass' : 'fail');

  const vEl = document.getElementById('res-verdict');
  vEl.textContent = verdictText;
  vEl.className = 'result-verdict ' + verdictClass;

  // 점수 바
  const pct = Math.min(100, (score60 / 60) * 100);
  const barEl = document.getElementById('score-bar');
  setTimeout(() => { barEl.style.width = pct + '%'; }, 100);
  barEl.className = 'score-bar-fill ' + (target ? 'target-c' : pass ? '' : 'fail-c');

  // 섹션별
  document.getElementById('res-vocab-score').textContent = `${vCorrect}/${vq.length}`;
  document.getElementById('res-vocab-detail').textContent = `정답률 ${vScore}%`;
  document.getElementById('res-gram-score').textContent = `${gCorrect}/${gq.length}`;
  document.getElementById('res-gram-detail').textContent = `정답률 ${gScore}%`;

  // 문항별 정오답 점
  function buildReviewDots(qs, as) {
    return qs.map((q, i) => {
      const a = as[i];
      const cls = a === 0 ? 'na' : a === q.answer ? 'ok' : 'ng';
      return `<div class="rdot ${cls}" title="${q.num}번">${q.num}</div>`;
    }).join('');
  }
  document.getElementById('review-vocab').innerHTML = buildReviewDots(vq, va);
  document.getElementById('review-gram').innerHTML  = buildReviewDots(gq, ga);

  showScreen('s-result');
}

/* ══════════════════════════════════════════
   화면 전환
══════════════════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goHome() {
  clearInterval(state.timerInterval);
  showScreen('s-select');
}
function retryExam() {
  startExam(state.examId);
}

/* ══════════════════════════════════════════
   초기화
══════════════════════════════════════════ */
renderExamList();
</script>
