<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT N3 모의고사</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;700&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f7f6f3;--surface:#ffffff;--border:#e8e6e0;--text:#1a1917;--muted:#8a8780;
  --accent:#3d6b4f;--accent-l:#eaf2ed;--accent-d:#2e5239;
  --warn:#c0392b;--warn-l:#fdecea;--gold:#c9963a;--gold-l:#fdf6e8;
  --radius:12px;--shadow:0 2px 16px rgba(0,0,0,.07);
  --mono:'DM Mono',monospace;--jp:'Noto Serif JP',serif;--sans:'Noto Sans KR',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.screen{display:none}.screen.active{display:flex;flex-direction:column;min-height:100vh}
#s-select{align-items:center;justify-content:center;padding:40px 20px}
.select-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px;box-shadow:var(--shadow);width:100%;max-width:520px}
.app-logo{font-family:var(--jp);font-size:1.6rem;font-weight:700;letter-spacing:3px;color:var(--text);margin-bottom:4px}
.app-sub{font-size:.78rem;color:var(--muted);letter-spacing:.5px;margin-bottom:32px}
.section-label{font-size:.7rem;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:12px}
.exam-list{display:flex;flex-direction:column;gap:8px}
.exam-item{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);cursor:pointer;transition:border-color .15s,background .15s;text-align:left}
.exam-item:hover{border-color:var(--accent);background:var(--accent-l)}
.exam-label{font-size:.95rem;font-weight:600;flex:1}
.exam-meta{font-size:.75rem;color:var(--muted)}
.exam-arrow{color:var(--border);font-size:.9rem}.exam-item:hover .exam-arrow{color:var(--accent)}
#s-exam{flex-direction:column}
.exam-header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:10px;height:56px;flex-shrink:0;position:sticky;top:0;z-index:100}
.hdr-section{font-size:.75rem;font-weight:700;color:var(--accent);letter-spacing:.5px}
.hdr-round{font-size:.8rem;color:var(--muted)}.hdr-spacer{flex:1}
.hdr-icon-btn{background:none;border:1.5px solid var(--border);border-radius:8px;padding:5px 10px;cursor:pointer;font-size:.9rem;color:var(--muted);transition:all .15s;line-height:1;flex-shrink:0}
.hdr-icon-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-l)}
.hdr-timer{font-family:var(--mono);font-size:1.1rem;font-weight:500;color:var(--text);background:var(--bg);padding:5px 14px;border-radius:8px;border:1px solid var(--border);min-width:80px;text-align:center;transition:color .3s,background .3s}
.hdr-timer.warn{color:var(--warn);background:var(--warn-l);border-color:#f5c6c2}
.hdr-timer.crit{color:#fff;background:var(--warn);border-color:var(--warn);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.progress-bar{height:3px;background:var(--border);flex-shrink:0}
.progress-fill{height:100%;background:var(--accent);transition:width .3s;border-radius:0 2px 2px 0}
.exam-body{flex:1;overflow-y:auto;padding:28px 24px 140px;max-width:720px;margin:0 auto;width:100%}
.mondai-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.mondai-badge{font-size:.7rem;font-weight:700;background:var(--accent);color:#fff;padding:3px 9px;border-radius:4px;letter-spacing:.5px}
.mondai-type{font-size:.78rem;color:var(--muted);font-weight:500}
.mondai-inst{font-size:.82rem;color:var(--text);line-height:1.5;margin-bottom:20px;padding:12px 14px;background:var(--accent-l);border-radius:8px;border-left:3px solid var(--accent)}
.q-num{font-family:var(--mono);font-size:.75rem;color:var(--muted);margin-bottom:8px}
.q-sentence{font-family:var(--jp);font-size:1.1rem;line-height:1.9;margin-bottom:20px;background:var(--surface);padding:18px 20px;border-radius:10px;border:1px solid var(--border)}
.q-sentence.kanji-q .tgt{text-decoration:underline;text-decoration-color:var(--accent);text-underline-offset:4px;font-weight:700}
.q-theme{font-family:var(--jp);font-size:1.2rem;font-weight:700;text-align:center;padding:18px;background:var(--surface);border-radius:10px;border:1px solid var(--border);margin-bottom:16px}
.passage-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px 22px;margin-bottom:20px;font-family:var(--jp);font-size:.95rem;line-height:2}
.passage-box .psg-title{font-size:.8rem;font-weight:700;color:var(--muted);margin-bottom:10px;letter-spacing:.5px}
.passage-box .blank-mark{display:inline-block;background:var(--accent-l);border:1.5px solid var(--accent);border-radius:4px;padding:0 6px;font-family:var(--mono);font-size:.8rem;font-weight:700;color:var(--accent);vertical-align:middle;margin:0 2px}
.passage-box .blank-mark.current{background:var(--accent);color:#fff}
.star-sentence{font-family:var(--jp);font-size:1rem;line-height:2;background:var(--surface);padding:16px 18px;border-radius:10px;border:1px solid var(--border);margin-bottom:8px}
.star-inst{font-size:.78rem;color:var(--muted);margin-bottom:16px;text-align:right}
.choices{display:flex;flex-direction:column;gap:10px}
.choice-btn{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);cursor:pointer;font-family:var(--jp);font-size:.95rem;line-height:1.6;transition:border-color .12s,background .12s,outline .1s;text-align:left;width:100%}
.choice-btn:hover:not(:disabled){border-color:var(--accent);background:var(--accent-l)}
.choice-btn.selected{border-color:var(--accent);background:var(--accent-l)}
.choice-btn:disabled{cursor:default}
.choice-num{font-family:var(--mono);font-size:.78rem;font-weight:700;color:var(--muted);flex-shrink:0;min-width:18px;padding-top:1px}
.choice-btn.selected .choice-num{color:inherit}
ruby rt{font-size:.55em;color:var(--muted)}
.exam-footer{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:10px 16px 6px;display:flex;flex-direction:column;gap:6px;z-index:100}
.footer-row{display:flex;align-items:center;gap:10px}
.nav-dots{flex:1;display:flex;flex-wrap:wrap;gap:5px;justify-content:center;max-width:600px;margin:0 auto}
.nav-dot{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;font-size:.65rem;font-weight:700;font-family:var(--mono);color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
.nav-dot.answered{background:var(--accent-l);border-color:var(--accent);color:var(--accent)}
.nav-dot.current{background:var(--accent);border-color:var(--accent);color:#fff;transform:scale(1.1)}
.nav-btn{padding:10px 20px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:.85rem;font-family:var(--sans);cursor:pointer;font-weight:600;transition:all .12s;flex-shrink:0}
.nav-btn:hover{border-color:var(--accent);background:var(--accent-l)}
.nav-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}.nav-btn.primary:hover{background:var(--accent-d)}
.nav-btn:disabled{opacity:.4;cursor:default}
.key-hint-bar{text-align:center;font-family:var(--mono);font-size:.66rem;color:var(--muted);letter-spacing:.2px;padding-bottom:2px}
.key-badge{display:inline-block;background:var(--border);border-radius:3px;padding:0 5px;margin:0 1px;font-size:.63rem;vertical-align:middle}
/* 일시정지 오버레이 */
#pause-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;align-items:center;justify-content:center}
.pause-card{background:var(--surface);border-radius:var(--radius);padding:52px 48px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.2);min-width:280px}
.pause-icon{font-size:2.8rem;margin-bottom:16px}
.pause-title{font-size:1.3rem;font-weight:700;margin-bottom:8px}
.pause-sub{color:var(--muted);font-size:.88rem;margin-bottom:28px}
/* 문제 상세 모달 */
#detail-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;align-items:center;justify-content:center;padding:20px}
.detail-card{background:var(--surface);border-radius:var(--radius);padding:28px;max-width:560px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.25)}
.detail-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.detail-qnum{font-family:var(--mono);font-size:.78rem;color:var(--muted);font-weight:600}
.detail-close{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--muted);padding:0 4px;line-height:1}
.detail-close:hover{color:var(--text)}
.detail-type{font-size:.72rem;background:var(--accent-l);color:var(--accent);padding:2px 8px;border-radius:4px;font-weight:600}
.detail-sent{font-family:var(--jp);font-size:1rem;line-height:1.85;padding:14px 16px;background:var(--bg);border-radius:8px;margin-bottom:14px;border:1px solid var(--border)}
.detail-choice{display:flex;gap:10px;padding:10px 14px;border-radius:8px;margin-bottom:6px;font-family:var(--jp);font-size:.9rem;border:1.5px solid var(--border)}
.detail-choice .cn{font-family:var(--mono);font-size:.75rem;font-weight:700;flex-shrink:0;padding-top:1px}
.detail-choice.d-correct{border-color:#27ae60;background:#eafaf1;color:#1a6d3c}
.detail-choice.d-wrong{border-color:var(--warn);background:var(--warn-l);color:var(--warn);text-decoration:line-through}
.detail-verdict{margin-top:14px;font-size:.82rem;text-align:center;padding:8px;border-radius:8px}
.detail-verdict.ok{background:#eafaf1;color:#1a6d3c;font-weight:700}
.detail-verdict.ng{background:var(--warn-l);color:var(--warn);font-weight:700}
.detail-verdict.na{background:var(--bg);color:var(--muted)}
.rdot{cursor:pointer;transition:transform .12s}.rdot:hover{transform:scale(1.2)}
/* 쉬는시간 */
#s-break{align-items:center;justify-content:center;padding:40px 20px}
.break-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:48px 40px;box-shadow:var(--shadow);max-width:420px;width:100%;text-align:center}
.break-icon{font-size:2.5rem;margin-bottom:16px}
.break-title{font-size:1.3rem;font-weight:700;margin-bottom:8px}
.break-sub{color:var(--muted);font-size:.9rem;margin-bottom:8px}
.break-stat{font-family:var(--mono);font-size:.85rem;color:var(--accent);background:var(--accent-l);padding:8px 16px;border-radius:8px;margin:16px 0 28px;display:inline-block}
.break-note{font-size:.8rem;color:var(--muted);margin-bottom:24px;line-height:1.6;background:var(--bg);padding:12px 16px;border-radius:8px;text-align:left}
.btn-start{width:100%;padding:16px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;font-family:var(--sans);cursor:pointer;transition:background .15s}
.btn-start:hover{background:var(--accent-d)}
/* 결과 */
#s-result{align-items:center;padding:40px 20px;background:var(--bg)}
.result-wrap{max-width:560px;width:100%}
.result-header{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:36px;box-shadow:var(--shadow);margin-bottom:20px;text-align:center}
.result-round{font-size:.8rem;color:var(--muted);margin-bottom:8px}
.result-score-main{font-family:var(--mono);font-size:3.5rem;font-weight:700;line-height:1;margin-bottom:6px}
.result-score-main.pass{color:var(--accent)}.result-score-main.target{color:var(--gold)}.result-score-main.fail{color:var(--warn)}
.result-score-sub{font-size:.9rem;color:var(--muted);margin-bottom:20px}
.result-verdict{display:inline-block;padding:6px 18px;border-radius:20px;font-size:.85rem;font-weight:700;margin-bottom:20px}
.verdict-pass{background:var(--accent-l);color:var(--accent)}.verdict-target{background:var(--gold-l);color:var(--gold)}.verdict-fail{background:var(--warn-l);color:var(--warn)}
.score-bar-wrap{position:relative;height:8px;background:var(--border);border-radius:4px;margin:16px 0 8px}
.score-bar-fill{height:100%;border-radius:4px;transition:width .8s ease;background:var(--accent)}
.score-bar-fill.target-c{background:var(--gold)}.score-bar-fill.fail-c{background:var(--warn)}
.score-markers{display:flex;justify-content:space-between;font-size:.68rem;color:var(--muted);margin-top:4px}
.score-marker-line{position:absolute;top:-4px;bottom:-4px;width:2px;border-radius:1px}
.marker-pass{background:var(--accent)}.marker-target{background:var(--gold)}
.result-sections{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.result-sec-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;text-align:center}
.sec-label{font-size:.72rem;font-weight:700;color:var(--muted);margin-bottom:4px;letter-spacing:.5px}
.sec-score{font-family:var(--mono);font-size:1.5rem;font-weight:700;color:var(--text)}
.sec-detail{font-size:.72rem;color:var(--muted);margin-top:2px}
.result-review{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:20px}
.review-title{font-size:.8rem;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:6px}
.review-hint{font-size:.72rem;color:var(--muted);margin-bottom:12px}
.review-dots{display:flex;flex-wrap:wrap;gap:6px}
.rdot{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;font-family:var(--mono)}
.rdot.ok{background:#eafaf1;color:#1a6d3c;border:1px solid #a9dfbf}
.rdot.ng{background:var(--warn-l);color:var(--warn);border:1px solid #f5c6c2}
.rdot.na{background:var(--bg);color:var(--muted);border:1px solid var(--border)}
.result-actions{display:flex;gap:10px}
.btn-retry,.btn-home{flex:1;padding:14px;border-radius:10px;font-size:.9rem;font-weight:700;font-family:var(--sans);cursor:pointer;transition:all .15s;border:1.5px solid}
.btn-retry{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-retry:hover{background:var(--accent-d)}
.btn-home{background:var(--bg);color:var(--text);border-color:var(--border)}.btn-home:hover{border-color:var(--accent);background:var(--accent-l)}
</style>
</head>
<body>

<!-- ══ 일시정지 오버레이 ══ -->
<div id="pause-overlay">
  <div class="pause-card">
    <div class="pause-icon">⏸</div>
    <div class="pause-title">일시정지</div>
    <div class="pause-sub">타이머가 멈췄어요</div>
    <button class="btn-start" onclick="togglePause()" style="width:180px">▶ 계속하기</button>
  </div>
</div>

<!-- ══ 문제 상세 모달 ══ -->
<div id="detail-modal" onclick="if(event.target===this)closeDetail()">
  <div class="detail-card">
    <div class="detail-hdr">
      <div style="display:flex;gap:8px;align-items:center">
        <span class="detail-qnum" id="detail-qnum"></span>
        <span class="detail-type" id="detail-type"></span>
      </div>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-sent" id="detail-sent"></div>
    <div id="detail-choices"></div>
    <div class="detail-verdict" id="detail-verdict"></div>
  </div>
</div>

<!-- ══ 회차 선택 ══ -->
<div id="s-select" class="screen active">
  <div class="select-card">
    <div class="app-logo">日本語</div>
    <div class="app-sub">JLPT N3 · 언어지식 모의고사</div>
    <div class="section-label">회차 선택</div>
    <div class="exam-list" id="exam-list"></div>
  </div>
</div>

<!-- ══ 시험 ══ -->
<div id="s-exam" class="screen">
  <header class="exam-header">
    <span class="hdr-section" id="hdr-section">문자어휘</span>
    <span class="hdr-round" id="hdr-round"></span>
    <span class="hdr-spacer"></span>
    <button class="hdr-icon-btn" onclick="goHomeConfirm()" title="홈으로">🏠</button>
    <button class="hdr-icon-btn" id="pause-btn" onclick="togglePause()" title="일시정지">⏸</button>
    <div class="hdr-timer" id="hdr-timer">30:00</div>
  </header>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="exam-body" id="exam-body"></div>
  <footer class="exam-footer">
    <div class="footer-row">
      <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">&#x2039; 이전</button>
      <div class="nav-dots" id="nav-dots"></div>
      <button class="nav-btn primary" id="btn-next" onclick="navigate(1)">다음 &#x203a;</button>
    </div>
    <div class="key-hint-bar">
      <span class="key-badge">1</span><span class="key-badge">2</span><span class="key-badge">3</span><span class="key-badge">4</span> 선택 &nbsp;·&nbsp;
      <span class="key-badge">Enter</span> / <span class="key-badge">→</span> 다음 &nbsp;·&nbsp;
      <span class="key-badge">←</span> 이전 &nbsp;·&nbsp;
      <span class="key-badge">Space</span> 일시정지
    </div>
  </footer>
</div>

<!-- ══ 쉬는시간 ══ -->
<div id="s-break" class="screen">
  <div class="break-card">
    <div class="break-icon">&#x2615;</div>
    <div class="break-title">문자어휘 완료!</div>
    <div class="break-sub">쉬는시간입니다. 준비되면 문법을 시작하세요.</div>
    <div class="break-stat" id="break-stat"></div>
    <div class="break-note">
      &#x26A0;&#xFE0F; 채점은 <strong>문법까지 완료한 후</strong>에 공개됩니다.<br>
      지금은 결과를 확인할 수 없어요.
    </div>
    <button class="btn-start" onclick="startGrammar()">문법 시험 시작하기 &#x2192;</button>
  </div>
</div>

<!-- ══ 결과 ══ -->
<div id="s-result" class="screen">
  <div class="result-wrap">
    <div class="result-header">
      <div class="result-round" id="res-round"></div>
      <div class="result-score-main" id="res-score"></div>
      <div class="result-score-sub">/ 60점 만점</div>
      <div class="result-verdict" id="res-verdict"></div>
      <div class="score-bar-wrap">
        <div class="score-bar-fill" id="score-bar"></div>
        <div class="score-marker-line marker-pass" style="left:33.3%"></div>
        <div class="score-marker-line marker-target" style="left:41.7%"></div>
      </div>
      <div class="score-markers"><span>0점</span><span style="position:relative;left:-8px">합격<br>20</span><span style="position:relative;left:-8px">목표<br>25</span><span>60점</span></div>
    </div>
    <div class="result-sections">
      <div class="result-sec-card">
        <div class="sec-label">문자어휘</div>
        <div class="sec-score" id="res-vocab-score"></div>
        <div class="sec-detail" id="res-vocab-detail"></div>
      </div>
      <div class="result-sec-card">
        <div class="sec-label">문법</div>
        <div class="sec-score" id="res-gram-score"></div>
        <div class="sec-detail" id="res-gram-detail"></div>
      </div>
    </div>
    <div class="result-review">
      <div class="review-title">문자어휘 정오답</div>
      <div class="review-hint">각 번호를 클릭하면 문제와 정답을 확인할 수 있어요</div>
      <div class="review-dots" id="review-vocab"></div>
    </div>
    <div class="result-review" id="review-gram-section">
      <div class="review-title">문법 정오답</div>
      <div class="review-hint">각 번호를 클릭하면 문제와 정답을 확인할 수 있어요</div>
      <div class="review-dots" id="review-gram"></div>
    </div>
    <div class="result-actions">
      <button class="btn-home" onclick="goHome()">&#x2190; 회차 선택</button>
      <button class="btn-retry" onclick="retryExam()">다시 풀기</button>
    </div>
  </div>
</div>

<script src="data_split/data_index.js"></script>
<script>
let state = {
  examId:null, exam:null, phase:'vocab', qIndex:0,
  vocabAnswers:[], gramAnswers:[],
  vocabTimeLeft:30*60, gramTimeLeft:20*60,
  timerInterval:null, paused:false,
};

/* ══ 유틸 ══ */
function parseRuby(t){return t.replace(/([^《》]+)《([^》]+)》/g,'<ruby>$1<rt>$2</rt></ruby>');}
function highlightTarget(s,t){
  if(!t)return parseRuby(s);
  const e=t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return parseRuby(s).replace(new RegExp(e,'g'),'<span class="tgt">'+t+'</span>');
}
function parsePassageMarker(s){
  const m=s.match(/^（지문[^）]*）(.+)/s)||s.match(/^\(지문[^)]*\)(.+)/s);
  return m?m[1].trim():s;
}
function fmtTime(s){const m=Math.floor(s/60),r=s%60;return String(m).padStart(2,'0')+':'+String(r).padStart(2,'0');}

/* ══ 동적 로딩 ══ */
window.__examCache=window.__examCache||{};
function loadExamFile(id){
  return new Promise((resolve,reject)=>{
    if(window.__examCache[id]){resolve(window.__examCache[id]);return;}
    const s=document.createElement('script');
    s.src='data_split/data_'+id+'.js';
    s.onload=()=>window.__examCache[id]?resolve(window.__examCache[id]):reject(new Error('로드 후 데이터 없음: '+id));
    s.onerror=()=>reject(new Error('파일 로드 실패: data_'+id+'.js'));
    document.head.appendChild(s);
  });
}

/* ══ 회차 목록 ══ */
function renderExamList(){
  const el=document.getElementById('exam-list');
  el.innerHTML='';
  const src=(typeof JLPT_N3_INDEX!=='undefined')?JLPT_N3_INDEX
    :(typeof JLPT_N3_DATA!=='undefined')
      ?{order:JLPT_N3_DATA.order,meta:Object.fromEntries(Object.entries(JLPT_N3_DATA.exams).map(([k,v])=>[k,Object.assign({},v,{vocabCount:v.vocab.length,gramCount:v.grammar.length})]))}
      :null;
  if(!src){el.innerHTML='<p style="color:red">data_split/data_index.js 를 찾을 수 없습니다</p>';return;}
  src.order.forEach(id=>{
    const e=src.meta[id];
    const li=document.createElement('button');
    li.className='exam-item';
    li.onclick=()=>startExam(id);
    li.innerHTML=
      '<span class="exam-label">'+e.label+'</span>'+
      '<span class="exam-meta">'+e.vocabCount+'문자어휘 · '+e.gramCount+'문법</span>'+
      '<span class="exam-arrow">&#x203a;</span>';
    el.appendChild(li);
  });
}

/* ══ 시험 시작 ══ */
function startExam(id){
  if(typeof JLPT_N3_DATA!=='undefined'&&JLPT_N3_DATA.exams&&JLPT_N3_DATA.exams[id])
    window.__examCache[id]=JLPT_N3_DATA.exams[id];
  if(window.__examCache[id]){_doStartExam(id,window.__examCache[id]);return;}
  const listEl=document.getElementById('exam-list');
  const saved=listEl.innerHTML;
  listEl.innerHTML='<p style="text-align:center;padding:2rem;color:#3D6B4F;font-size:1.1rem">&#x23F3; '+id+' 로딩 중...</p>';
  loadExamFile(id)
    .then(exam=>{listEl.innerHTML=saved;_doStartExam(id,exam);})
    .catch(err=>{listEl.innerHTML=saved;alert('로드 실패: '+err.message);});
}
function _doStartExam(id,exam){
  state.examId=id;state.exam=exam;state.phase='vocab';state.qIndex=0;state.paused=false;
  state.vocabAnswers=new Array(exam.vocab.length).fill(0);
  state.gramAnswers=new Array(exam.grammar.length).fill(0);
  state.vocabTimeLeft=30*60;state.gramTimeLeft=20*60;
  document.getElementById('hdr-section').textContent='문자어휘 (30분)';
  document.getElementById('hdr-round').textContent=exam.label;
  document.getElementById('pause-btn').textContent='⏸';
  document.getElementById('pause-overlay').style.display='none';
  showScreen('s-exam');renderQuestion();startTimer();
}

/* ══ 타이머 ══ */
function startTimer(){
  clearInterval(state.timerInterval);
  const el=document.getElementById('hdr-timer');
  state.timerInterval=setInterval(()=>{
    if(state.paused)return;
    if(state.phase==='vocab'){
      state.vocabTimeLeft=Math.max(0,state.vocabTimeLeft-1);
      el.textContent=fmtTime(state.vocabTimeLeft);
      el.className='hdr-timer'+(state.vocabTimeLeft<=60?' crit':state.vocabTimeLeft<=300?' warn':'');
      if(state.vocabTimeLeft===0)endVocab();
    }else{
      state.gramTimeLeft=Math.max(0,state.gramTimeLeft-1);
      el.textContent=fmtTime(state.gramTimeLeft);
      el.className='hdr-timer'+(state.gramTimeLeft<=60?' crit':state.gramTimeLeft<=300?' warn':'');
      if(state.gramTimeLeft===0)showResult();
    }
  },1000);
}

/* ══ 홈 확인 ══ */
function goHomeConfirm(){
  if(state.qIndex>0||currentAnswers().some(a=>a>0)){
    if(!confirm('시험을 중단하고 홈으로 돌아가시겠어요?\n현재 답변은 저장되지 않아요.'))return;
  }
  clearInterval(state.timerInterval);
  state.paused=false;
  document.getElementById('pause-overlay').style.display='none';
  showScreen('s-select');
}

/* ══ 일시정지 ══ */
function togglePause(){
  state.paused=!state.paused;
  const overlay=document.getElementById('pause-overlay');
  const btn=document.getElementById('pause-btn');
  if(state.paused){
    overlay.style.display='flex';
    btn.textContent='▶';btn.title='재개';
  }else{
    overlay.style.display='none';
    btn.textContent='⏸';btn.title='일시정지';
  }
}

/* ══ 키보드 ══ */
document.addEventListener('keydown',function(e){
  if(document.getElementById('detail-modal').style.display==='flex'){
    if(e.key==='Escape')closeDetail();
    return;
  }
  if(!document.getElementById('s-exam').classList.contains('active'))return;
  if(e.key===' '){togglePause();e.preventDefault();return;}
  if(state.paused)return;
  if(['1','2','3','4'].includes(e.key)){
    const n=parseInt(e.key);
    const qs=currentQuestions();
    if(qs.length&&state.qIndex<qs.length){
      selectAnswer(state.qIndex,n);
      const btns=document.querySelectorAll('.choice-btn');
      if(btns[n-1]){
        btns[n-1].style.outline='3px solid var(--accent)';
        setTimeout(()=>{if(btns[n-1])btns[n-1].style.outline='';},250);
      }
    }
    e.preventDefault();
  }else if(e.key==='Enter'||e.key==='ArrowRight'){
    if(!document.getElementById('btn-next').disabled)document.getElementById('btn-next').click();
    e.preventDefault();
  }else if(e.key==='ArrowLeft'){
    if(!document.getElementById('btn-prev').disabled)document.getElementById('btn-prev').click();
    e.preventDefault();
  }
});

/* ══ 문제 렌더 ══ */
function currentQuestions(){return state.phase==='vocab'?state.exam.vocab:state.exam.grammar;}
function currentAnswers(){return state.phase==='vocab'?state.vocabAnswers:state.gramAnswers;}

const INSTRUCTIONS={
  '漢字読み':'___の言葉の読み方として最もよいものを、1・2・3・4から一つえらびなさい。',
  '表記':'___のことばを漢字で書くとき、最もよいものを、1・2・3・4から一つえらびなさい。',
  '文脈規定':'（　）に入れるのに最もよいものを、1・2・3・4から一つえらびなさい。',
  '言換類義':'___に意味が最も近いものを、1・2・3・4から一つえらびなさい。',
  '用法':'つぎのことばの使い方として最もよいものを、1・2・3・4から一つえらびなさい。',
  '文法形式':'つぎの文の（　）に入れるのに最もよいものを、1・2・3・4から一つえらびなさい。',
  '文並替★':'つぎの文の　★　に入る最もよいものを、1・2・3・4から一つえらびなさい。',
  '文章文法':'つぎの文章を読んで、（　）の中に入る最もよいものを、1・2・3・4から一つえらびなさい。',
};

function getPassageGroup(qs,idx){
  const q=qs[idx];
  if(q.type!=='文章文法')return null;
  return qs.filter(x=>x.mondai===q.mondai&&x.type==='文章文法');
}
function buildPassageHtml(group,cur){
  const first=parsePassageMarker(group[0].sentence);
  if((first.match(/\(\d+\)/g)||[]).length>=2||first.length>200){
    return parseRuby(first).replace(/\((\d+)\)/g,function(_,n){
      return '<span class="blank-mark'+(parseInt(n)===cur?' current':'')+'">(' +n+')</span>';
    });
  }
  return group.map(q=>{
    const s=parsePassageMarker(q.sentence);
    return parseRuby(s).replace(/\((\d+)\)/g,'<span class="blank-mark'+(q.num===cur?' current':'')+'">($1)</span>');
  }).join('<br>');
}

function renderQuestion(){
  const qs=currentQuestions(),idx=state.qIndex,q=qs[idx];
  const ans=currentAnswers(),total=qs.length;
  document.getElementById('prog-fill').style.width=(ans.filter(a=>a>0).length/total*100).toFixed(1)+'%';
  renderDots(qs,ans,idx);
  document.getElementById('btn-prev').disabled=idx===0;
  const isLast=idx===total-1;
  const noGram=!state.exam.grammar||state.exam.grammar.length===0;
  document.getElementById('btn-next').textContent=isLast
    ?(state.phase==='vocab'?(noGram?'채점하기 →':'문자어휘 완료 →'):'채점하기 →'):'다음 ›';

  let html='';
  if(idx===0||qs[idx-1].mondai!==q.mondai){
    const inst=INSTRUCTIONS[q.type]||'';
    html+='<div class="mondai-header"><span class="mondai-badge">問題 '+q.mondai+'</span><span class="mondai-type">'+q.type+'</span></div>';
    if(inst)html+='<div class="mondai-inst">'+inst+'</div>';
  }
  html+='<div class="q-num">'+(idx+1)+' / '+total+' &nbsp;—&nbsp; 문항 '+q.num+'번</div>';

  if(q.type==='用法'){
    html+='<div class="q-theme">'+parseRuby(q.sentence)+'</div>'+buildChoices(q,ans[idx],idx);
  }else if(q.type==='文並替★'){
    html+='<div class="star-sentence">'+parseRuby(q.sentence.replace(/___★___/,'<strong>＿★＿</strong>'))+'</div>';
    html+='<div class="star-inst">★ の位置に入るものを選んでください</div>'+buildChoices(q,ans[idx],idx);
  }else if(q.type==='文章文法'){
    const g=getPassageGroup(qs,idx);
    if(g)html+='<div class="passage-box"><div class="psg-title">文章</div><div>'+buildPassageHtml(g,q.num)+'</div></div>';
    html+=buildChoices(q,ans[idx],idx);
  }else if(q.type==='漢字読み'||q.type==='言換類義'){
    html+='<div class="q-sentence kanji-q">'+highlightTarget(q.sentence,q.target)+'</div>'+buildChoices(q,ans[idx],idx);
  }else{
    html+='<div class="q-sentence">'+parseRuby(q.sentence)+'</div>'+buildChoices(q,ans[idx],idx);
  }
  document.getElementById('exam-body').innerHTML=html;
}

function buildChoices(q,ua,idx){
  let h='<div class="choices">';
  q.choices.forEach((ch,ci)=>{
    const n=ci+1;
    h+='<button class="choice-btn'+(ua===n?' selected':'')+'" onclick="selectAnswer('+idx+','+n+')">'
      +'<span class="choice-num">'+n+'</span><span>'+parseRuby(ch)+'</span></button>';
  });
  return h+'</div>';
}

function renderDots(qs,ans,cur){
  const wrap=document.getElementById('nav-dots');
  wrap.innerHTML='';
  qs.forEach((q,i)=>{
    const d=document.createElement('button');
    d.className='nav-dot'+(i===cur?' current':ans[i]>0?' answered':'');
    d.textContent=q.num;
    d.onclick=()=>{state.qIndex=i;renderQuestion();};
    wrap.appendChild(d);
  });
}

function selectAnswer(idx,n){currentAnswers()[idx]=n;renderQuestion();}

function navigate(dir){
  const qs=currentQuestions(),newIdx=state.qIndex+dir;
  if(newIdx<0)return;
  if(newIdx>=qs.length){if(state.phase==='vocab')endVocab();else showResult();return;}
  state.qIndex=newIdx;renderQuestion();
  document.getElementById('exam-body').scrollTop=0;
}

/* ══ 섹션 전환 ══ */
function endVocab(){
  clearInterval(state.timerInterval);
  if(!state.exam.grammar||state.exam.grammar.length===0){showResult();return;}
  const ans=state.vocabAnswers.filter(a=>a>0).length,tot=state.exam.vocab.length;
  const el=30*60-state.vocabTimeLeft,mm=Math.floor(el/60),ss=el%60;
  document.getElementById('break-stat').textContent=ans+'/'+tot+'문항 답변 · 소요 '+mm+'분 '+ss+'초';
  showScreen('s-break');
}
function startGrammar(){
  if(!state.exam.grammar||state.exam.grammar.length===0){showResult();return;}
  state.phase='grammar';state.qIndex=0;state.gramTimeLeft=20*60;
  document.getElementById('hdr-section').textContent='문법 (20분)';
  document.getElementById('hdr-timer').textContent='20:00';
  state.paused=false;
  document.getElementById('pause-overlay').style.display='none';
  document.getElementById('pause-btn').textContent='⏸';
  showScreen('s-exam');renderQuestion();startTimer();
}

/* ══ 채점 ══ */
function showResult(){
  clearInterval(state.timerInterval);
  const vq=state.exam.vocab,va=state.vocabAnswers;
  const gq=state.exam.grammar,ga=state.gramAnswers;
  const totalQ=vq.length+gq.length;
  const vC=va.filter((a,i)=>a===vq[i].answer).length;
  const gC=ga.filter((a,i)=>a===gq[i].answer).length;
  const s60=Math.round((vC+gC)/totalQ*60*10)/10;
  const vS=Math.round(vC/vq.length*100);
  const gS=gq.length?Math.round(gC/gq.length*100):0;
  const pass=s60>=20,target=s60>=25;
  let vc,vt;
  if(target){vc='verdict-target';vt='🎯 목표 달성!';}
  else if(pass){vc='verdict-pass';vt='✅ 합격';}
  else{vc='verdict-fail';vt='❌ 불합격';}
  document.getElementById('res-round').textContent=state.exam.label;
  const se=document.getElementById('res-score');
  se.textContent=s60.toFixed(1);se.className='result-score-main '+(target?'target':pass?'pass':'fail');
  const ve=document.getElementById('res-verdict');
  ve.textContent=vt;ve.className='result-verdict '+vc;
  const pct=Math.min(100,s60/60*100);
  const bar=document.getElementById('score-bar');
  setTimeout(()=>{bar.style.width=pct+'%';},100);
  bar.className='score-bar-fill '+(target?'target-c':pass?'':'fail-c');
  document.getElementById('res-vocab-score').textContent=vC+'/'+vq.length;
  document.getElementById('res-vocab-detail').textContent='정답률 '+vS+'%';
  document.getElementById('res-gram-score').textContent=gq.length?gC+'/'+gq.length:'-';
  document.getElementById('res-gram-detail').textContent=gq.length?'정답률 '+gS+'%':'문법 없음';
  document.getElementById('review-vocab').innerHTML=dots(vq,va,'vocab');
  document.getElementById('review-gram').innerHTML=dots(gq,ga,'grammar');
  document.getElementById('review-gram-section').style.display=gq.length?'':'none';
  showScreen('s-result');
}

function dots(qs,as,phase){
  return qs.map(function(q,i){
    const a=as[i],cls=a===0?'na':a===q.answer?'ok':'ng';
    return '<div class="rdot '+cls+'" title="'+q.num+'번 — 클릭하면 상세보기" onclick="openDetail(\''+phase+'\','+i+')">'+q.num+'</div>';
  }).join('');
}

/* ══ 문제 상세 모달 ══ */
function openDetail(phase,idx){
  const qs=phase==='vocab'?state.exam.vocab:state.exam.grammar;
  const as=phase==='vocab'?state.vocabAnswers:state.gramAnswers;
  const q=qs[idx],ua=as[idx];
  document.getElementById('detail-qnum').textContent='문항 '+q.num+'번';
  document.getElementById('detail-type').textContent=q.type;
  let sent=q.sentence||'';
  if(q.target)sent=sent.replace(new RegExp(q.target.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'),'<u>'+q.target+'</u>');
  document.getElementById('detail-sent').innerHTML=parseRuby(sent)||'(문장 없음)';
  let ch='';
  q.choices.forEach(function(c,ci){
    const n=ci+1;
    let cls='detail-choice';
    if(n===q.answer)cls+=' d-correct';
    else if(n===ua&&ua!==q.answer)cls+=' d-wrong';
    ch+='<div class="'+cls+'"><span class="cn">'+n+'</span>'+parseRuby(c)+'</div>';
  });
  document.getElementById('detail-choices').innerHTML=ch;
  const vd=document.getElementById('detail-verdict');
  if(ua===0){vd.className='detail-verdict na';vd.textContent='미선택 — 정답: '+q.answer+'번';}
  else if(ua===q.answer){vd.className='detail-verdict ok';vd.textContent='✅ 정답! ('+ua+'번)';}
  else{vd.className='detail-verdict ng';vd.textContent='❌ 오답 — 내 답: '+ua+'번 / 정답: '+q.answer+'번';}
  document.getElementById('detail-modal').style.display='flex';
}
function closeDetail(){document.getElementById('detail-modal').style.display='none';}

/* ══ 화면 전환 ══ */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goHome(){clearInterval(state.timerInterval);showScreen('s-select');}
function retryExam(){startExam(state.examId);}

renderExamList();
</script>
</body>
</html>
